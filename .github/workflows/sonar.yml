name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build and analyze
        run: mvn -B clean verify sonar:sonar \
          -Dsonar.projectKey=collab-core_Expense-tracker \
          -Dsonar.organization=collab-core \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}